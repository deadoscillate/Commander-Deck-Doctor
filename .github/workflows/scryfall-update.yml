name: Scryfall Oracle Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Oracle data
        run: npm run scryfall:update

      - name: Verify compiled Oracle data
        run: npm run scryfall:verify

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/scryfall-oracle-update
          delete-branch: true
          commit-message: "chore(data): update scryfall oracle cards"
          title: "chore(data): update Scryfall Oracle cards"
          body: |
            Automated weekly refresh of `oracle-cards.compiled.json` from the Scryfall bulk Oracle dataset.

            Generated by `.github/workflows/scryfall-update.yml`.
          labels: |
            data
            automation
          add-paths: |
            data/scryfall/oracle-cards.compiled.json
