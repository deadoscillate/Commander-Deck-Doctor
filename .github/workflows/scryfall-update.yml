name: Scryfall Oracle Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Oracle data
        run: npm run scryfall:update

      - name: Verify compiled Oracle data
        run: npm run scryfall:verify

      - name: Detect Oracle data changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/scryfall/oracle-cards.compiled.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push Oracle update branch
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin chore/scryfall-oracle-update:refs/remotes/origin/chore/scryfall-oracle-update || true
          git checkout -B chore/scryfall-oracle-update
          git add data/scryfall/oracle-cards.compiled.json
          git commit -m "chore(data): update scryfall oracle cards"
          git push --force-with-lease origin chore/scryfall-oracle-update

      - name: Create or update Oracle update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PR_TOKEN || github.token }}
        shell: bash
        run: |
          PR_BODY=$(cat <<'EOF'
          Automated weekly refresh of `oracle-cards.compiled.json` from the Scryfall bulk Oracle dataset.

          Generated by `.github/workflows/scryfall-update.yml`.
          EOF
          )

          PR_NUMBER=$(gh pr list --head chore/scryfall-oracle-update --base main --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --title "chore(data): update Scryfall Oracle cards" \
              --body "$PR_BODY" \
              --add-label data \
              --add-label automation
            exit 0
          fi

          if ! gh pr create \
            --base main \
            --head chore/scryfall-oracle-update \
            --title "chore(data): update Scryfall Oracle cards" \
            --body "$PR_BODY" \
            --label data \
            --label automation; then
            echo "::warning::Unable to create the Scryfall update pull request automatically. Enable 'Allow GitHub Actions to create and approve pull requests' or provide an AUTOMATION_PR_TOKEN secret."
          fi
