name: Telemetry Summary

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days"
        required: false
        default: ""
      since:
        description: "Only include requests at or after this ISO-8601 timestamp"
        required: false
        default: ""
      last:
        description: "Only include the most recent N requests"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: telemetry-summary
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL || secrets.DATABASE_URL || secrets.POSTGRES_URL }}
      INPUT_DAYS: ${{ github.event.inputs.days }}
      INPUT_SINCE: ${{ github.event.inputs.since }}
      INPUT_LAST: ${{ github.event.inputs.last }}
      TELEMETRY_REPORT_DAYS: ${{ vars.TELEMETRY_REPORT_DAYS }}
      TELEMETRY_REPORT_BRANCH: ${{ vars.TELEMETRY_REPORT_BRANCH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve report settings
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DAYS="${INPUT_DAYS:-}"
          REPORT_SINCE="${INPUT_SINCE:-}"
          REPORT_LAST="${INPUT_LAST:-}"
          REPORT_BRANCH="${TELEMETRY_REPORT_BRANCH:-telemetry-reports}"

          if [ -z "$REPORT_DAYS" ] && [ -z "$REPORT_SINCE" ] && [ -z "$REPORT_LAST" ]; then
            REPORT_DAYS="${TELEMETRY_REPORT_DAYS:-7}"
          fi

          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing PROD_DATABASE_URL / DATABASE_URL / POSTGRES_URL secret for telemetry summary." >&2
            exit 1
          fi

          echo "REPORT_DAYS=$REPORT_DAYS" >> "$GITHUB_ENV"
          echo "REPORT_SINCE=$REPORT_SINCE" >> "$GITHUB_ENV"
          echo "REPORT_LAST=$REPORT_LAST" >> "$GITHUB_ENV"
          echo "REPORT_BRANCH=$REPORT_BRANCH" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate telemetry summary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p telemetry-output
          CMD=(npm run telemetry:summary --)

          if [ -n "${REPORT_DAYS:-}" ]; then
            CMD+=(--days "$REPORT_DAYS")
          fi

          if [ -n "${REPORT_SINCE:-}" ]; then
            CMD+=(--since "$REPORT_SINCE")
          fi

          if [ -n "${REPORT_LAST:-}" ]; then
            CMD+=(--last "$REPORT_LAST")
          fi

          CMD+=(--output telemetry-output/latest.md --json-output telemetry-output/latest.json)
          "${CMD[@]}"

      - name: Prepare static telemetry branch files
        shell: bash
        run: |
          set -euo pipefail

          cat > telemetry-output/vercel.json <<'EOF'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "git": {
              "deploymentEnabled": false
            }
          }
          EOF

          node <<'EOF'
          const fs = require("node:fs");
          const path = require("node:path");

          const outputDir = path.join(process.cwd(), "telemetry-output");
          const markdown = fs.readFileSync(path.join(outputDir, "latest.md"), "utf8");
          const escaped = markdown
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

          const html = `<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Commander Deck Doctor Telemetry</title>
              <style>
                :root {
                  color-scheme: dark;
                  --bg: #06101b;
                  --panel: rgba(10, 24, 40, 0.88);
                  --border: rgba(102, 176, 255, 0.28);
                  --text: #d8e7f7;
                }
                * { box-sizing: border-box; }
                body {
                  margin: 0;
                  min-height: 100vh;
                  padding: 24px;
                  font-family: system-ui, sans-serif;
                  background: linear-gradient(180deg, #07111d 0%, #0a1b2d 100%);
                  color: var(--text);
                }
                main {
                  max-width: 1100px;
                  margin: 0 auto;
                  background: var(--panel);
                  border: 1px solid var(--border);
                  border-radius: 20px;
                  padding: 24px;
                  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
                }
                h1 {
                  margin: 0 0 16px;
                  font-size: 28px;
                }
                p {
                  margin: 0 0 16px;
                  color: #9db6cf;
                }
                pre {
                  margin: 0;
                  white-space: pre-wrap;
                  word-break: break-word;
                  font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Telemetry Summary</h1>
                <p>This branch is generated for telemetry reporting. It is not an application deployment target.</p>
                <pre>${escaped}</pre>
              </main>
            </body>
          </html>`;

          fs.writeFileSync(path.join(outputDir, "index.html"), html, "utf8");
          EOF

          touch telemetry-output/.nojekyll

      - name: Add workflow summary
        run: cat telemetry-output/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: analyze-telemetry-summary
          path: telemetry-output/
          if-no-files-found: error

      - name: Publish report branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          rm -rf telemetry-publish
          mkdir telemetry-publish
          cp -R telemetry-output/. telemetry-publish/

          cd telemetry-publish
          git init
          git checkout --orphan "$REPORT_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: refresh telemetry summary"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:"$REPORT_BRANCH" --force
